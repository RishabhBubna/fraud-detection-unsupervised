name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r src/req_inference.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Download models from S3
        run: |
          VAE_PATH=$(jq -r '.VAE_path' src/Metadata/experiment_info.json)
          ISO_PATH=$(jq -r '.ISO_path' src/Metadata/experiment_info.json)
          PIPELINE_PATH=$(jq -r '.pipeline_path' src/Metadata/experiment_info.json)
          
          aws s3 cp $VAE_PATH src/model/ --recursive
          aws s3 cp $ISO_PATH src/model/ --recursive
          aws s3 cp $PIPELINE_PATH src/model/pipeline/ --recursive
      
      - name: Run tests
        run: |
          cd src
          pytest tests/test_api.py -v

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./src
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection:latest